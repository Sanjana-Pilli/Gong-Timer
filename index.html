<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gong Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gong-purple: #6a1bb5;
    --gong-purple-deep: #3a006b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #ffffff;
    font-family: 'Poppins', 'Segoe UI', sans-serif;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 14px 14px;
    text-align: center;
  }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .logo-row img {
    width: 140px;
    height: auto;
  }
  .logo-row span {
    font-size: 22px;
    font-weight: 800;
    color: var(--gong-purple-deep);
    letter-spacing: 0.04em;
  }
  .headline {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--gong-purple-deep);
    margin-bottom: 2px;
  }
  .subline {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 10px;
  }
  .timer {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .unit {
    background: linear-gradient(135deg, var(--gong-purple-deep) 0%, var(--gong-purple) 100%);
    border-radius: 10px;
    padding: 16px 14px 14px;
    min-width: 72px;
    color: #fff;
    box-shadow: 0 4px 12px rgba(106,27,181,0.25);
  }
  .digits {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0.85;
  }
  .footer {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gong-purple-deep);
    margin-bottom: 10px;
  }
  .cta {
    display: inline-block;
    padding: 8px 18px;
    background: var(--gong-purple);
    color: #ffffff;
    text-decoration: none;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 4px 12px rgba(106,27,181,0.3);
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .cta:hover {
    background: var(--gong-purple-deep);
    transform: translateY(-1px);
  }
  .launched {
    font-size: 18px;
    font-weight: 800;
    text-transform: uppercase;
    color: var(--gong-purple-deep);
    padding: 10px 0;
  }
</style>
</head>
